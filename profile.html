<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Profile Hero -->
    <div class="profile-hero">
      <button onclick="goBack()" style="position:absolute;top:14px;left:14px;z-index:2;background:rgba(255,255,255,0.2);border:none;border-radius:var(--radius-md);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button style="position:absolute;top:14px;right:14px;z-index:2;background:rgba(255,255,255,0.2);border:none;border-radius:var(--radius-md);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;" onclick="location.href='settings.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="profile-hero-inner">
        <div class="profile-avatar-wrap">
          <div class="avatar avatar-2xl avatar-ring-gold" style="background:linear-gradient(135deg,rgba(255,255,255,0.2),rgba(255,255,255,0.05));color:white;font-size:2.5rem;border:3px solid rgba(255,255,255,0.5);">👑</div>
          <div class="profile-edit-badge" onclick="showToast('Edit avatar','')">✏️</div>
        </div>
        <h2 style="margin-bottom:6px;">ShadowX_Pro</h2>
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">
          <span class="rank-badge rank-diamond" style="background:rgba(255,255,255,0.2);color:white;">💎 Diamond</span>
          <span class="level-badge">Lv. 47</span>
          <span class="chip" style="background:rgba(255,255,255,0.2);color:white;font-size:0.7rem;">🔥 7 Day Streak</span>
        </div>
      </div>
    </div>

    <div class="profile-card-body">
      <!-- XP Bar -->
      <div class="xp-bar-container" style="margin-bottom:16px;">
        <div class="xp-bar-label">
          <span>XP Progress</span>
          <span style="font-weight:700;color:var(--primary);">6,500 / 10,000</span>
        </div>
        <div class="xp-bar-track"><div class="xp-bar-fill" style="--xp-width:65%;"></div></div>
      </div>

      <!-- Stats Grid -->
      <div class="profile-stats-grid" style="margin-bottom:16px;">
        <div class="profile-stat-box">
          <div class="profile-stat-val" style="color:var(--secondary);">342</div>
          <div class="profile-stat-lbl">Wins</div>
        </div>
        <div class="profile-stat-box">
          <div class="profile-stat-val" style="color:var(--danger);">89</div>
          <div class="profile-stat-lbl">Losses</div>
        </div>
        <div class="profile-stat-box">
          <div class="profile-stat-val" style="color:var(--warning);">24</div>
          <div class="profile-stat-lbl">Draws</div>
        </div>
        <div class="profile-stat-box">
          <div class="profile-stat-val" style="color:var(--primary);">4250</div>
          <div class="profile-stat-lbl">Score</div>
        </div>
      </div>

      <!-- Coins & Resources -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--warning-light);border-radius:var(--radius-lg);padding:14px;display:flex;align-items:center;gap:10px;" onclick="location.href='/pages/topup.html'" style="cursor:pointer;">
          <span style="font-size:1.6rem;">💰</span>
          <div>
            <div style="font-size:1.1rem;font-weight:800;color:#92400E;">12,450</div>
            <div style="font-size:0.7rem;color:#B45309;">Coins • Tap to top up</div>
          </div>
        </div>
        <div style="background:var(--primary-light);border-radius:var(--radius-lg);padding:14px;display:flex;align-items:center;gap:10px;" onclick="location.href='/pages/vault.html'">
          <span style="font-size:1.6rem;">🎒</span>
          <div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--primary);">4</div>
            <div style="font-size:0.7rem;color:var(--primary-dark);">Items • View vault</div>
          </div>
        </div>
      </div>

      <!-- Equipped Items -->
      <div style="margin-bottom:16px;">
        <div style="font-size:0.9rem;font-weight:700;margin-bottom:10px;">Equipped</div>
        <div style="display:flex;gap:10px;">
          <div style="flex:1;background:var(--surface);border-radius:var(--radius-md);padding:12px;text-align:center;cursor:pointer;" onclick="location.href='vault.html'">
            <div style="font-size:1.6rem;margin-bottom:4px;">🐉</div>
            <div style="font-size:0.68rem;font-weight:600;color:var(--text-secondary);">Frame</div>
            <div style="font-size:0.7rem;color:var(--primary);">Dragon</div>
          </div>
          <div style="flex:1;background:var(--surface);border-radius:var(--radius-md);padding:12px;text-align:center;cursor:pointer;" onclick="location.href='vault.html'">
            <div style="font-size:1.6rem;margin-bottom:4px;">❄️</div>
            <div style="font-size:0.68rem;font-weight:600;color:var(--text-secondary);">Skin</div>
            <div style="font-size:0.7rem;color:var(--primary);">Ice Crystal</div>
          </div>
          <div style="flex:1;background:var(--surface);border-radius:var(--radius-md);padding:12px;text-align:center;cursor:pointer;" onclick="location.href='shop.html'">
            <div style="font-size:1.6rem;margin-bottom:4px;">➕</div>
            <div style="font-size:0.68rem;font-weight:600;color:var(--text-secondary);">Effect</div>
            <div style="font-size:0.7rem;color:var(--text-tertiary);">None</div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
        <button class="btn btn-ghost btn-sm" onclick="location.href='achievements.html'">🏅 Achievements</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='history.html'">📋 Match History</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='friends-list.html'">👥 Friends</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='settings.html'">⚙️ Settings</button>
      </div>

      <button class="btn btn-danger btn-full btn-sm" onclick="location.href='login.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>

    <div id="nav-slot"></div>
  </div>
  <script src="data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
