<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicTacArena — Friends</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="page-title">Friends</span>
    <span id="friendCount" style="margin-left:auto;font-size:0.78rem;color:var(--text-secondary);">6/100</span>
  </div>
  <main class="page-content fade-in">
    <div style="padding:12px 16px 8px;">
      <div class="tab-bar" id="friendsTabs">
        <button class="tab-btn active" data-tab="friends" onclick="switchTab(this)">Friends (6)</button>
        <button class="tab-btn" data-tab="requests" onclick="switchTab(this)">Requests (2)</button>
        <button class="tab-btn" data-tab="blocked" onclick="switchTab(this)">Blocked</button>
      </div>
    </div>
    <div id="tab-friends">
      <div id="friendsList"></div>
    </div>
    <div id="tab-requests" class="hidden">
      <div id="requestsList"></div>
    </div>
    <div id="tab-blocked" class="hidden">
      <div id="blockedList"></div>
    </div>
  </main>
  <div id="nav-slot"></div>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
function switchTab(btn) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const tab = btn.dataset.tab;
  document.getElementById("tab-friends").classList.toggle("hidden", tab!=="friends");
  document.getElementById("tab-requests").classList.toggle("hidden", tab!=="requests");
  document.getElementById("tab-blocked").classList.toggle("hidden", tab!=="blocked");
}

document.addEventListener("DOMContentLoaded",()=>{
  renderFriends();
  renderRequests();
  renderBlocked();
});

function renderFriends() {
  const el = document.getElementById("friendsList");
  el.innerHTML = FRIENDS.map(f=>`
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-light);">
      <div style="position:relative;">
        <div class="avatar avatar-md" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:white;font-size:1.2rem;">${f.avatar}</div>
        ${f.online?'<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--secondary);border-radius:50%;border:2px solid white;"></div>':''}
      </div>
      <div style="flex:1;">
        <div style="font-size:0.875rem;font-weight:700;">${f.name}</div>
        <div style="font-size:0.72rem;color:var(--text-secondary);">${f.rank} · Lv.${f.level} · ${f.online?'<span style="color:var(--secondary);">Online</span>':f.lastSeen}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" onclick="showToast('Challenge sent!','success')">⚔️</button>
        <button class="btn btn-ghost btn-sm" onclick="location.href='/pages/chat.html?id=${f.id}'">💬</button>
        <button class="btn btn-ghost btn-sm" onclick="if(confirm('Remove friend?'))showToast('Removed','error')">✕</button>
      </div>
    </div>
  `).join("");
}

function renderRequests() {
  const el = document.getElementById("requestsList");
  el.innerHTML = FRIEND_REQUESTS.map(f=>`
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-light);">
      <div class="avatar avatar-md" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:white;font-size:1.2rem;">${f.avatar}</div>
      <div style="flex:1;">
        <div style="font-size:0.875rem;font-weight:700;">${f.name}</div>
        <div style="font-size:0.72rem;color:var(--text-secondary);">${f.rank} · Lv.${f.level}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="showToast('Accepted!','success')">✓</button>
        <button class="btn btn-ghost btn-sm" onclick="showToast('Declined','error')">✕</button>
        <button class="btn btn-ghost btn-sm" onclick="showToast('Blocked','error')">🚫</button>
      </div>
    </div>
  `).join("");
}

function renderBlocked() {
  const el = document.getElementById("blockedList");
  el.innerHTML = BLOCKED_USERS.map(f=>`
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-light);">
      <div class="avatar avatar-md" style="background:var(--surface-2);color:var(--text-tertiary);font-size:1.2rem;">${f.avatar}</div>
      <div style="flex:1;">
        <div style="font-size:0.875rem;font-weight:600;color:var(--text-secondary);">${f.name}</div>
        <div style="font-size:0.72rem;color:var(--text-tertiary);">Blocked</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="showToast('Unblocked!','success')">Unblock</button>
    </div>
  `).join("") || '<div class="empty-state"><div class="empty-state-icon">🚫</div><div class="empty-state-text">No blocked users</div></div>';
}
</script>
</body>
</html>
