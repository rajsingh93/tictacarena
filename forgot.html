<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicTacArena — Reset Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="auth-page">
      <div class="auth-logo" style="background:linear-gradient(135deg,#F59E0B,#D97706);">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">Enter your email to receive a password reset link</p>
      <div class="auth-form">
        <div class="input-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input type="email" class="input-field" placeholder="you@example.com">
          </div>
        </div>
        <button class="btn btn-gradient btn-full btn-lg" id="resetBtn" onclick="sendReset()">Send Reset Link</button>
        <div id="successMsg" class="hidden" style="background:var(--secondary-light);color:var(--secondary);padding:14px;border-radius:var(--radius-md);margin-top:16px;font-size:0.875rem;font-weight:600;text-align:center;">✅ Reset link sent to your email!</div>
        <div style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--text-secondary);">Remember password? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign in</a></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function sendReset() {
      document.getElementById('resetBtn').textContent = 'Sending...';
      document.getElementById('resetBtn').disabled = true;
      setTimeout(() => { document.getElementById('successMsg').classList.remove('hidden'); }, 1500);
    }
  </script>
</body>
</html>
