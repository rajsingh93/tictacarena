<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Top Up Coins</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .topup-hero { background:linear-gradient(135deg,#7C3AED,#5B21B6); margin:16px; border-radius:var(--radius-xl); padding:24px; text-align:center; color:#fff; }
    .topup-hero-amount { font-size:3rem; font-weight:900; }
    .topup-hero-lbl { font-size:.85rem; opacity:.8; margin-top:4px; }
    .topup-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px; }
    .topup-card { background:var(--bg); border-radius:var(--radius-lg); border:1.5px solid var(--border); padding:18px; text-align:center; cursor:pointer; transition:var(--transition); position:relative; overflow:hidden; }
    .topup-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--primary); }
    .topup-card.popular { border-color:var(--primary); background:var(--primary-light); }
    .topup-popular-badge { position:absolute; top:0; right:0; background:var(--primary); color:#fff; font-size:.6rem; font-weight:800; padding:3px 10px; border-bottom-left-radius:var(--radius-md); }
    .topup-emoji { font-size:2.5rem; margin-bottom:6px; }
    .topup-coins { font-size:1.3rem; font-weight:900; color:var(--warning); }
    .topup-bonus { font-size:.7rem; color:var(--secondary); font-weight:700; margin:2px 0; }
    .topup-price { font-size:1rem; font-weight:800; color:var(--text-primary); margin-top:6px; }
    .topup-price span { font-size:.75rem; color:var(--text-secondary); font-weight:500; }
    .payment-section { padding:16px; }
    .payment-title { font-weight:700; font-size:.9rem; margin-bottom:10px; color:var(--text-primary); }
    .payment-methods { display:flex; flex-direction:column; gap:8px; }
    .payment-method { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border-radius:var(--radius-lg); border:1.5px solid var(--border); cursor:pointer; transition:var(--transition); }
    .payment-method:hover { border-color:var(--primary); background:var(--primary-light); }
    .payment-method.selected { border-color:var(--primary); background:var(--primary-light); }
    .pm-icon { width:40px; height:28px; border-radius:var(--radius-xs); display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
    .pm-name { font-weight:600; font-size:.9rem; flex:1; }
    .pm-radio { width:18px; height:18px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .payment-method.selected .pm-radio { border-color:var(--primary); background:var(--primary); }
    .payment-method.selected .pm-radio::after { content:''; width:6px; height:6px; border-radius:50%; background:#fff; display:block; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="page-title">🪙 Add Coins</span>
  </div>

  <main class="page-content fade-in">
    <!-- Hero balance -->
    <div class="topup-hero">
      <div class="topup-hero-amount">🪙 2,450</div>
      <div class="topup-hero-lbl">Current Balance</div>
    </div>

    <!-- Packs -->
    <div style="padding:0 16px 10px; font-weight:700; font-size:.9rem; color:var(--text-primary);">Select a Pack</div>
    <div class="topup-grid">
      <div class="topup-card" onclick="selectPack(this, 100, 0.99)">
        <div class="topup-emoji">💰</div>
        <div class="topup-coins">100 🪙</div>
        <div class="topup-price">$0.99</div>
      </div>
      <div class="topup-card popular" onclick="selectPack(this, 500, 3.99)">
        <div class="topup-popular-badge">POPULAR</div>
        <div class="topup-emoji">💎</div>
        <div class="topup-coins">500 🪙</div>
        <div class="topup-bonus">+50 BONUS</div>
        <div class="topup-price">$3.99</div>
      </div>
      <div class="topup-card" onclick="selectPack(this, 1000, 6.99)">
        <div class="topup-emoji">🎁</div>
        <div class="topup-coins">1,000 🪙</div>
        <div class="topup-bonus">+150 BONUS</div>
        <div class="topup-price">$6.99</div>
      </div>
      <div class="topup-card" onclick="selectPack(this, 5000, 24.99)">
        <div class="topup-emoji">👑</div>
        <div class="topup-coins">5,000 🪙</div>
        <div class="topup-bonus">+1000 BONUS</div>
        <div class="topup-price">$24.99</div>
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="payment-section">
      <div class="payment-title">Payment Method</div>
      <div class="payment-methods">
        <div class="payment-method selected" onclick="selectPayment(this)">
          <div class="pm-icon">💳</div>
          <div class="pm-name">Credit / Debit Card</div>
          <div class="pm-radio"></div>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <div class="pm-icon">🅿️</div>
          <div class="pm-name">PayPal</div>
          <div class="pm-radio"></div>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <div class="pm-icon">🍎</div>
          <div class="pm-name">Apple Pay</div>
          <div class="pm-radio"></div>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <div class="pm-icon">🟢</div>
          <div class="pm-name">Google Pay</div>
          <div class="pm-radio"></div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div style="padding:0 16px 24px;">
      <button class="btn-primary" style="width:100%; padding:14px; font-size:1rem;" onclick="processPurchase()">
        🪙 Purchase Now
      </button>
      <p style="text-align:center;font-size:.72rem;color:var(--text-tertiary);margin-top:10px;">Secure payment · Coins credited instantly</p>
    </div>
  </main>

  <div id="nav-slot"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
let selectedPack = { coins: 500, price: 3.99 };

function selectPack(el, coins, price) {
  document.querySelectorAll('.topup-card').forEach(c => c.style.borderColor = '');
  el.style.borderColor = 'var(--primary)';
  selectedPack = { coins, price };
  document.querySelector('.btn-primary').textContent = `🪙 Buy ${coins.toLocaleString()} for $${price}`;
}

function selectPayment(el) {
  document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
  el.classList.add('selected');
}

function processPurchase() {
  showToast(`Processing $${selectedPack.price} purchase...`, 'info');
  setTimeout(() => showToast(`+${selectedPack.coins} coins added! 🪙`, 'success'), 1500);
}

setActiveNav('');
</script>
</body>
</html>
