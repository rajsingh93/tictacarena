<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Offline</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background:#fff; }
    .offline-page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; }
    .pulse-ring { width:120px; height:120px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center; margin-bottom:28px; position:relative; }
    .pulse-ring::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:3px solid var(--border); animation:pulseRing 2s infinite; }
    .pulse-ring::after { content:''; position:absolute; inset:-20px; border-radius:50%; border:2px solid var(--border); animation:pulseRing 2s .5s infinite; }
    @keyframes pulseRing { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.3)} }
    .error-title { font-size:1.6rem; font-weight:900; color:var(--text-primary); margin-bottom:8px; }
    .error-sub { font-size:.9rem; color:var(--text-secondary); max-width:300px; line-height:1.6; margin-bottom:28px; }
    .connection-tips { background:var(--surface); border-radius:var(--radius-lg); padding:16px; text-align:left; max-width:320px; width:100%; margin-bottom:24px; }
    .tip-item { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:.82rem; color:var(--text-secondary); }
    .retry-btn { position:relative; overflow:hidden; }
    .retry-btn .spinner { display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; margin-right:6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-container" style="background:#fff;">
  <div class="offline-page">
    <div class="pulse-ring">
      <span style="font-size:3rem;">📡</span>
    </div>

    <div class="error-title">You're Offline</div>
    <div class="error-sub">No internet connection detected. Please check your connection and try again.</div>

    <div class="connection-tips">
      <div style="font-size:.8rem;font-weight:700;color:var(--text-primary);margin-bottom:8px;">Quick Fixes</div>
      <div class="tip-item"><span>📶</span> Check your Wi-Fi or mobile data</div>
      <div class="tip-item"><span>✈️</span> Turn off airplane mode</div>
      <div class="tip-item"><span>🔄</span> Restart your router or device</div>
      <div class="tip-item"><span>🌐</span> Try a different network</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;">
      <button class="btn-primary retry-btn" id="retryBtn" onclick="retryConnection()">
        <div class="spinner" id="retrySpinner"></div>
        🔁 Retry Connection
      </button>
      <button class="btn-secondary" onclick="showToast('Playing offline mode... (Training only)')">
        🤖 Play Offline vs Bot
      </button>
    </div>

    <div style="margin-top:20px;font-size:.75rem;color:var(--text-tertiary);" id="statusText">
      Last connected: Just now
    </div>
  </div>
</div>

<script>
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:50px;font-size:.85rem;font-weight:600;z-index:9999;white-space:nowrap;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function retryConnection() {
  const btn = document.getElementById('retryBtn');
  const spinner = document.getElementById('retrySpinner');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btn.childNodes[btn.childNodes.length - 1].textContent = ' Checking...';
  setTimeout(() => {
    spinner.style.display = 'none';
    btn.childNodes[btn.childNodes.length - 1].textContent = ' Retry Connection';
    btn.disabled = false;
    if (navigator.onLine) {
      showToast('Connected! Redirecting...');
      setTimeout(() => location.href = '../index.html', 1000);
    } else {
      showToast('Still offline. Please check your connection.');
      document.getElementById('statusText').textContent = 'Retry failed at ' + new Date().toLocaleTimeString();
    }
  }, 2000);
}

window.addEventListener('online', () => {
  showToast('Connection restored! Redirecting...');
  setTimeout(() => location.href = 'index.html', 1000);
});
</script>
</body>
</html>
