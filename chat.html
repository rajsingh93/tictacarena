<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Chat</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-app { display:flex; flex-direction:column; height:100vh; }
    .chat-view { display:none; flex-direction:column; height:100%; }
    .chat-view.active { display:flex; }
    .messages-area { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:10px; }
    .msg-in .bubble { background:var(--surface); border-radius:4px 16px 16px 16px; }
    .msg-out { align-items:flex-end; }
    .msg-out .bubble { background:var(--primary); color:white; border-radius:16px 4px 16px 16px; }
    .msg-time { font-size:0.65rem; color:var(--text-tertiary); margin-top:3px; }
    .chat-input-bar { padding:10px 14px; background:var(--bg); border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; padding-bottom:calc(10px + env(safe-area-inset-bottom,0)); }
  </style>
</head>
<body>
<div class="app-container">
  <div class="chat-app">
    <!-- Chat List View -->
    <div class="chat-view active" id="chatListView">
      <div class="page-header">
        <button class="back-btn" onclick="goBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="page-title">Messages</span>
      </div>
      <main style="flex:1;overflow-y:auto;" class="page-content fade-in">
        <div id="chatListContainer"></div>
      </main>
      <div id="nav-slot"></div>
    </div>

    <!-- Individual Chat View -->
    <div class="chat-view" id="chatConvoView">
      <div class="page-header" id="chatHeader" style="padding:10px 14px;">
        <button class="back-btn" onclick="showChatList()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="avatar avatar-sm" id="chatAvatar" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:white;">🔥</div>
        <div style="flex:1;margin-left:4px;">
          <div id="chatName" style="font-size:0.9rem;font-weight:700;">QueenB_Fire</div>
          <div id="chatStatus" style="font-size:0.7rem;color:var(--secondary);">Online</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="showToast('Challenge sent!','success')">⚔️ Challenge</button>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-bar">
        <button onclick="sendEmoji()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px;">😊</button>
        <input type="text" class="input-field" id="msgInput" placeholder="Type a message..." style="flex:1;padding:10px 14px;font-size:0.875rem;" onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="btn btn-primary btn-sm" onclick="sendMsg()" style="border-radius:50%;width:40px;height:40px;padding:0;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
let activeChat = null;

document.addEventListener('DOMContentLoaded', () => {
  renderChatList();
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  if (id) openChat(id);
});

function renderChatList() {
  const el = document.getElementById('chatListContainer');
  const chats = FRIENDS.map(f => ({
    friend: f,
    msgs: CHAT_MESSAGES[f.id] || [],
    unread: (CHAT_MESSAGES[f.id] || []).filter(m => m.from !== 1 && !m.read).length
  }));
  
  el.innerHTML = chats.map(c => `
    <div class="chat-list-item ${c.unread ? 'unread' : ''}" onclick="openChat(${c.friend.id})">
      <div style="position:relative;">
        <div class="avatar avatar-md" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:white;font-size:1.2rem;">${c.friend.avatar}</div>
        ${c.friend.online ? '<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--secondary);border-radius:50%;border:2px solid white;"></div>' : ''}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="chat-preview-name">${c.friend.name}</span>
          <span class="chat-preview-time">${c.msgs.length ? (c.msgs[c.msgs.length-1].time || 'Now') : ''}</span>
        </div>
        <div class="chat-preview-msg truncate">${c.msgs.length ? c.msgs[c.msgs.length-1].text : 'No messages yet'}</div>
      </div>
      ${c.unread ? `<div class="chat-unread-badge">${c.unread}</div>` : ''}
    </div>
  `).join('');
}

function openChat(friendId) {
  const friend = FRIENDS.find(f => f.id === friendId);
  if (!friend) return;
  activeChat = friend;
  
  document.getElementById('chatListView').classList.remove('active');
  document.getElementById('chatConvoView').classList.add('active');
  document.getElementById('chatName').textContent = friend.name;
  document.getElementById('chatAvatar').textContent = friend.avatar;
  document.getElementById('chatStatus').textContent = friend.online ? 'Online' : 'Offline';
  
  renderMessages(friendId);
}

function renderMessages(friendId) {
  const msgs = CHAT_MESSAGES[friendId] || [];
  const el = document.getElementById('messagesArea');
  
  el.innerHTML = msgs.map(m => {
    const isOut = m.from === 1;
    return `
      <div style="display:flex;flex-direction:column;align-items:${isOut ? 'flex-end' : 'flex-start'};">
        <div class="bubble" style="padding:10px 14px;border-radius:${isOut ? '16px 4px 16px 16px' : '4px 16px 16px 16px'};background:${isOut ? 'var(--primary)' : 'var(--surface)'};color:${isOut ? 'white' : 'inherit'};max-width:75%;font-size:0.875rem;">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    `;
  }).join('');
  
  el.scrollTop = el.scrollHeight;
}

function showChatList() {
  document.getElementById('chatConvoView').classList.remove('active');
  document.getElementById('chatListView').classList.add('active');
  renderChatList();
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeChat) return;
  
  const el = document.getElementById('messagesArea');
  el.insertAdjacentHTML('beforeend', `
    <div style="display:flex;flex-direction:column;align-items:flex-end;">
      <div style="padding:10px 14px;border-radius:16px 4px 16px 16px;background:var(--primary);color:white;max-width:75%;font-size:0.875rem;">${text}</div>
      <div class="msg-time">Just now</div>
    </div>
  `);
  input.value = '';
  el.scrollTop = el.scrollHeight;
  
  // Simulate reply
  setTimeout(() => {
    const replies = ['👍','Nice!','GG!','Let\'s play soon!','Agreed!','🔥🔥','Haha ok!'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    el.insertAdjacentHTML('beforeend', `
      <div style="display:flex;flex-direction:column;align-items:flex-start;">
        <div style="padding:10px 14px;border-radius:4px 16px 16px 16px;background:var(--surface);max-width:75%;font-size:0.875rem;">${reply}</div>
        <div class="msg-time">Just now</div>
      </div>
    `);
    el.scrollTop = el.scrollHeight;
  }, 1200);
}

function sendEmoji() {
  const emojis = ['😂','🔥','👊','💪','😎','🏆','❤️','👋'];
  document.getElementById('msgInput').value += emojis[Math.floor(Math.random() * emojis.length)];
  document.getElementById('msgInput').focus();
}
</script>
</body>
</html>
