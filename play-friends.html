<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Play with Friends</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="page-header">
      <button class="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="page-title">Play with Friends</span>
    </div>

    <main class="page-content no-nav fade-in" style="padding:20px 16px;">
      
      <!-- Mode Selector -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;">
        <button class="btn" id="createBtn" onclick="selectMode('create')"
          style="background:var(--primary);color:white;padding:20px 12px;border-radius:var(--radius-xl);flex-direction:column;gap:8px;height:auto;">
          <span style="font-size:2rem;">🔗</span>
          <span>Create Room</span>
          <span style="font-size:0.72rem;opacity:0.8;font-weight:400;">Host a new game</span>
        </button>
        <button class="btn" id="joinBtn" onclick="selectMode('join')"
          style="background:var(--surface);color:var(--text-primary);padding:20px 12px;border-radius:var(--radius-xl);flex-direction:column;gap:8px;height:auto;border:1.5px solid var(--border);">
          <span style="font-size:2rem;">🚪</span>
          <span>Join Room</span>
          <span style="font-size:0.72rem;color:var(--text-secondary);font-weight:400;">Enter a room code</span>
        </button>
      </div>

      <!-- Create Room Section -->
      <div id="createSection">
        <div style="background:var(--surface);border-radius:var(--radius-xl);padding:20px;margin-bottom:16px;">
          <div style="font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">Your Room Code</div>
          <div class="room-code" id="roomCode" onclick="copyToClipboard('X7K9P2')">X7K9P2</div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-ghost btn-sm btn-full" onclick="copyToClipboard('X7K9P2')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy Code
            </button>
            <button class="btn btn-ghost btn-sm btn-full" onclick="shareRoom()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
            <button class="btn btn-ghost btn-sm" onclick="refreshCode()">🔄</button>
          </div>
        </div>

        <!-- Waiting for Player -->
        <div style="text-align:center;padding:24px;background:var(--primary-light);border-radius:var(--radius-xl);margin-bottom:16px;">
          <div style="font-size:2rem;margin-bottom:8px;">⏳</div>
          <div style="font-weight:700;color:var(--primary);">Waiting for opponent...</div>
          <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px;">Share the code above with a friend</div>
          <div class="loading-dots" style="justify-content:center;margin-top:12px;">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>

        <!-- Or invite from friends -->
        <div style="font-size:0.9rem;font-weight:700;margin-bottom:12px;">Invite Friends</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:var(--radius-lg);">
            <div class="avatar avatar-sm" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:white;">🔥</div>
            <div style="flex:1;font-size:0.875rem;font-weight:600;">QueenB_Fire <span style="color:var(--secondary);font-size:0.7rem;">• Online</span></div>
            <button class="btn btn-primary btn-sm" onclick="showToast('Invite sent!','success')">Invite</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:var(--radius-lg);">
            <div class="avatar avatar-sm" style="background:linear-gradient(135deg,#059669,#10B981);color:white;">⚡</div>
            <div style="flex:1;font-size:0.875rem;font-weight:600;">ZephyrStorm <span style="color:var(--secondary);font-size:0.7rem;">• Online</span></div>
            <button class="btn btn-primary btn-sm" onclick="showToast('Invite sent!','success')">Invite</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:var(--radius-lg);">
            <div class="avatar avatar-sm" style="background:linear-gradient(135deg,#D97706,#B45309);color:white;">🌌</div>
            <div style="flex:1;font-size:0.875rem;font-weight:600;">CosmicDust <span style="color:var(--secondary);font-size:0.7rem;">• Online</span></div>
            <button class="btn btn-primary btn-sm" onclick="showToast('Invite sent!','success')">Invite</button>
          </div>
        </div>
      </div>

      <!-- Join Room Section (hidden by default) -->
      <div id="joinSection" class="hidden">
        <div style="background:var(--surface);border-radius:var(--radius-xl);padding:20px;margin-bottom:16px;text-align:center;">
          <div style="font-size:2rem;margin-bottom:12px;">🚪</div>
          <div style="font-weight:700;margin-bottom:4px;">Enter Room Code</div>
          <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:16px;">Ask your friend for their room code</div>
          
          <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;" id="codeInputs">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,0)">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,1)">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,2)">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,3)">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,4)">
            <input class="input-field" maxlength="1" style="width:48px;height:52px;text-align:center;font-size:1.4rem;font-weight:800;text-transform:uppercase;padding:8px;" oninput="handleCodeInput(this,5)">
          </div>
          
          <button class="btn btn-gradient btn-full" id="joinNowBtn" onclick="joinRoom()" disabled style="opacity:0.6;">Join Game</button>
        </div>
      </div>

      <div style="height:20px;"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function selectMode(mode) {
      const isCreate = mode === 'create';
      document.getElementById('createBtn').style.background = isCreate ? 'var(--primary)' : 'var(--surface)';
      document.getElementById('createBtn').style.color = isCreate ? 'white' : 'var(--text-primary)';
      document.getElementById('joinBtn').style.background = !isCreate ? 'var(--primary)' : 'var(--surface)';
      document.getElementById('joinBtn').style.color = !isCreate ? 'white' : 'var(--text-primary)';
      document.getElementById('createSection').classList.toggle('hidden', !isCreate);
      document.getElementById('joinSection').classList.toggle('hidden', isCreate);
    }

    function refreshCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      document.getElementById('roomCode').textContent = code;
      showToast('Room code refreshed!', 'success');
    }

    function shareRoom() {
      if (navigator.share) {
        navigator.share({ title: 'Join my TicTacArena game!', text: 'Use code: X7K9P2', url: window.location.href });
      } else {
        copyToClipboard('X7K9P2');
      }
    }

    function handleCodeInput(el, index) {
      const inputs = document.querySelectorAll('#codeInputs input');
      if (el.value && index < 5) inputs[index + 1].focus();
      const filled = [...inputs].every(i => i.value.trim());
      const btn = document.getElementById('joinNowBtn');
      btn.disabled = !filled;
      btn.style.opacity = filled ? '1' : '0.6';
    }

    function joinRoom() {
      const inputs = document.querySelectorAll('#codeInputs input');
      const code = [...inputs].map(i => i.value).join('').toUpperCase();
      if (code.length < 6) { showToast('Enter full 6-digit code', 'error'); return; }
      showToast('Joining game...', '');
      setTimeout(() => { location.href = 'game.html'; }, 1500);
    }
  </script>
</body>
</html>
