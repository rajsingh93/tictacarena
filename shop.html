<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Shop</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .shop-category-tabs { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
    .shop-category-tabs::-webkit-scrollbar { display:none; }
    .cat-tab { flex-shrink:0; padding:6px 14px; border-radius:var(--radius-full); font-size:.8rem; font-weight:600; border:1.5px solid var(--border); background:var(--bg); color:var(--text-secondary); cursor:pointer; transition:var(--transition); }
    .cat-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 16px; }
    .shop-item-card { background:var(--bg); border-radius:var(--radius-lg); border:1.5px solid var(--border); overflow:hidden; transition:var(--transition); position:relative; }
    .shop-item-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .item-img { width:100%; aspect-ratio:1; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:3rem; }
    .rarity-badge { position:absolute; top:8px; right:8px; padding:2px 8px; border-radius:var(--radius-full); font-size:.65rem; font-weight:700; text-transform:uppercase; }
    .rarity-common { background:#E5E7EB; color:#6B7280; }
    .rarity-rare { background:#DBEAFE; color:#2563EB; }
    .rarity-epic { background:#EDE9FE; color:#7C3AED; }
    .rarity-legendary { background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#92400E; }
    .item-info { padding:10px; }
    .item-name { font-size:.85rem; font-weight:700; color:var(--text-primary); margin-bottom:6px; }
    .item-footer { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .item-price { display:flex; align-items:center; gap:4px; font-weight:700; color:var(--warning); font-size:.85rem; }
    .btn-buy { padding:5px 12px; border-radius:var(--radius-full); font-size:.75rem; font-weight:700; background:var(--primary); color:#fff; border:none; cursor:pointer; transition:var(--transition); }
    .btn-buy:hover { background:var(--primary-dark); transform:scale(1.05); }
    .btn-equip { padding:5px 12px; border-radius:var(--radius-full); font-size:.75rem; font-weight:700; background:var(--secondary); color:#fff; border:none; cursor:pointer; transition:var(--transition); }
    .btn-equip:hover { transform:scale(1.05); }
    .btn-owned { padding:5px 12px; border-radius:var(--radius-full); font-size:.75rem; font-weight:600; background:var(--surface-2); color:var(--text-secondary); border:none; cursor:default; }
    .shop-header-coins { display:flex; align-items:center; gap:6px; padding:10px 16px; background:var(--surface); border-radius:var(--radius-lg); margin:0 16px 4px; }
    .featured-banner { margin:12px 16px; border-radius:var(--radius-xl); background:linear-gradient(135deg,#7C3AED,#5B21B6); padding:20px; color:#fff; position:relative; overflow:hidden; }
    .featured-banner::after { content:''; position:absolute; right:-20px; top:-20px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.08); }
    .featured-title { font-size:1.1rem; font-weight:800; margin-bottom:4px; }
    .featured-sub { font-size:.8rem; opacity:.8; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="page-title">🛒 Shop</span>
    <a href="/pages/topup.html" style="margin-left:auto;display:flex;align-items:center;gap:5px;background:var(--warning-light);color:var(--warning);padding:6px 12px;border-radius:var(--radius-full);font-size:.8rem;font-weight:700;text-decoration:none;">
      <span>🪙</span> 2,450
    </a>
  </div>

  <main class="page-content fade-in">
    <!-- Featured -->
    <div class="featured-banner">
      <div class="featured-title">🔥 Limited Offer</div>
      <div class="featured-sub">Legendary Dragon Skin — 50% OFF today only!</div>
      <button class="btn-primary" style="padding:8px 20px;font-size:.85rem;" onclick="showToast('Added to cart!')">Get Now</button>
    </div>

    <!-- Coin balance -->
    <div class="shop-header-coins">
      <span>🪙</span>
      <span style="font-weight:700;color:var(--warning)">2,450 coins</span>
      <a href="topup.html" style="margin-left:auto;font-size:.75rem;font-weight:700;color:var(--primary);">+ Add Coins</a>
    </div>

    <!-- Category tabs -->
    <div class="shop-category-tabs" id="categoryTabs">
      <button class="cat-tab active" onclick="filterShop('all',this)">All</button>
      <button class="cat-tab" onclick="filterShop('avatar',this)">Avatars</button>
      <button class="cat-tab" onclick="filterShop('frame',this)">Frames</button>
      <button class="cat-tab" onclick="filterShop('skin',this)">Skins</button>
      <button class="cat-tab" onclick="filterShop('effect',this)">Effects</button>
    </div>

    <!-- Items Grid -->
    <div class="shop-grid" id="shopGrid"></div>
  </main>

  <div id="nav-slot"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
const SHOP_ITEMS_DATA = [
  { id:1, name:'Dragon Master', type:'avatar', emoji:'🐉', price:800, rarity:'legendary', owned:false },
  { id:2, name:'Ice Queen', type:'avatar', emoji:'👸', price:400, rarity:'epic', owned:true },
  { id:3, name:'Shadow Wolf', type:'avatar', emoji:'🐺', price:200, rarity:'rare', owned:false },
  { id:4, name:'Pixel Bot', type:'avatar', emoji:'🤖', price:100, rarity:'common', owned:true },
  { id:5, name:'Fire Frame', type:'frame', emoji:'🔥', price:600, rarity:'legendary', owned:false },
  { id:6, name:'Gold Frame', type:'frame', emoji:'✨', price:350, rarity:'epic', owned:false },
  { id:7, name:'Neon Frame', type:'frame', emoji:'💜', price:250, rarity:'rare', owned:true },
  { id:8, name:'Classic Frame', type:'frame', emoji:'⬜', price:50, rarity:'common', owned:true },
  { id:9, name:'Lava Board', type:'skin', emoji:'🌋', price:700, rarity:'legendary', owned:false },
  { id:10, name:'Ocean Board', type:'skin', emoji:'🌊', price:300, rarity:'rare', owned:false },
  { id:11, name:'Galaxy Board', type:'skin', emoji:'🌌', price:500, rarity:'epic', owned:true },
  { id:12, name:'Wooden Board', type:'skin', emoji:'🪵', price:80, rarity:'common', owned:true },
  { id:13, name:'Thunder Strike', type:'effect', emoji:'⚡', price:900, rarity:'legendary', owned:false },
  { id:14, name:'Confetti Pop', type:'effect', emoji:'🎉', price:200, rarity:'rare', owned:false },
  { id:15, name:'Star Burst', type:'effect', emoji:'⭐', price:450, rarity:'epic', owned:false },
  { id:16, name:'Bubble Float', type:'effect', emoji:'🫧', price:120, rarity:'common', owned:true },
];

let currentFilter = 'all';

function filterShop(type, el) {
  currentFilter = type;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderShop();
}

function renderShop() {
  const grid = document.getElementById('shopGrid');
  const items = currentFilter === 'all' ? SHOP_ITEMS_DATA : SHOP_ITEMS_DATA.filter(i => i.type === currentFilter);
  grid.innerHTML = items.map(item => `
    <div class="shop-item-card">
      <div class="item-img">${item.emoji}</div>
      <span class="rarity-badge rarity-${item.rarity}">${item.rarity}</span>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-footer">
          <div class="item-price"><span>🪙</span>${item.price}</div>
          ${item.owned
            ? `<button class="btn-equip" onclick="showToast('${item.name} equipped!')">Equip</button>`
            : `<button class="btn-buy" onclick="buyItem(${item.id})">Buy</button>`
          }
        </div>
      </div>
    </div>
  `).join('');
}

function buyItem(id) {
  const item = SHOP_ITEMS_DATA.find(i => i.id === id);
  if (!item) return;
  showConfirm(`Buy ${item.name} for 🪙${item.price}?`, () => {
    item.owned = true;
    renderShop();
    showToast(`${item.name} purchased!`, 'success');
  });
}

renderShop();
setActiveNav('shop');
</script>
</body>
</html>
