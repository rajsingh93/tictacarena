<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TicTacArena — Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #fff; }
    .auth-page { padding: 40px 24px 32px; }
    .auth-form { width: 100%; max-width: 400px; margin: 0 auto; }
    .or-line { display:flex;align-items:center;gap:12px;margin:20px 0; }
    .or-line::before,.or-line::after{content:'';flex:1;height:1px;background:var(--border);}
    .or-text{font-size:0.78rem;color:var(--text-tertiary);font-weight:500;}
    .auth-footer { text-align:center;margin-top:24px;font-size:0.875rem;color:var(--text-secondary); }
    .auth-footer a { color:var(--primary);font-weight:600; }
    .social-row { display:flex;gap:10px;margin-top:12px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="auth-page">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <h1 class="auth-title">Welcome Back!</h1>
      <p class="auth-subtitle">Sign in to continue to TicTacArena</p>
      
      <div class="auth-form">
        <!-- Google Login (Primary) -->
        <button class="google-btn" onclick="handleGoogleLogin()">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <div class="or-line"><span class="or-text">or sign in with email</span></div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" class="input-field" placeholder="you@example.com">
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" class="input-field" placeholder="Enter your password">
          </div>
        </div>

        <div style="text-align:right;margin:-6px 0 14px;">
          <a href="forgot.html" style="font-size:0.8rem;color:var(--primary);font-weight:600;">Forgot password?</a>
        </div>

        <button class="btn btn-gradient btn-full btn-lg" onclick="location.href='/index.html'">
          Sign In
        </button>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up free</a>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    function handleGoogleLogin() {
      const btn = document.querySelector('.google-btn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => { location.href = 'index.html'; }, 1500);
    }
  </script>
</body>
</html>
